name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    # Publish on a v* tag push (automatic once a release tag is cut), or a
    # manual workflow_dispatch run targeting a v* tag ref. A branch dispatch is
    # skipped so it can never publish a dev version. We trigger on the tag push
    # (not the GitHub Release event) to avoid the trap where a release created
    # by GITHUB_TOKEN does not trigger downstream workflows.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (no npm token is stored)

    steps:
      # Third-party actions are pinned to immutable commit SHAs (the trailing
      # comment records the human-readable version), matching ci.yml. Floating
      # tag refs are a supply-chain risk on a workflow that publishes to npm.
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Node 24 ships an npm (>= 11.5.1) new enough for OIDC trusted publishing;
      # OIDC needs npm >= 11.5.1 and Node >= 22.14. registry-url must be set.
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the package
        run: npm run build:packages

      - name: Set version from the tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing @openorca-ui/react at $VERSION"
          npm version "$VERSION" --no-git-tag-version --workspace @openorca-ui/react

      # Auth is via OIDC trusted publishing: configure the trusted publisher on
      # npmjs.com for @openorca-ui/react (repo mahimailabs/openorca-ui, workflow
      # publish.yml, environment npm). No NPM_TOKEN is used, and provenance is
      # generated automatically (no --provenance flag needed).
      - name: Publish (idempotent)
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@openorca-ui/react@$VERSION" version >/dev/null 2>&1; then
            echo "@openorca-ui/react@$VERSION already published, skipping"
          else
            npm publish --workspace @openorca-ui/react --access public
          fi

name: Publish npm packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    # Publish on a v* tag push (automatic once a release tag is cut), or a
    # manual workflow_dispatch run targeting a v* tag ref. A branch dispatch is
    # skipped so it can never publish a dev version. We trigger on the tag push
    # (not the GitHub Release event) to avoid the trap where a release created
    # by GITHUB_TOKEN does not trigger downstream workflows.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (no npm token is stored)

    steps:
      # Third-party actions are pinned to immutable commit SHAs (the trailing
      # comment records the human-readable version), matching ci.yml. Floating
      # tag refs are a supply-chain risk on a workflow that publishes to npm.
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Node 24 ships an npm (>= 11.5.1) new enough for OIDC trusted publishing;
      # OIDC needs npm >= 11.5.1 and Node >= 22.14. registry-url must be set.
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages (core -> react -> theme)
        run: npm run build:packages

      - name: Set versions from the tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing @openorca-ui/* at $VERSION"
          for pkg in core react theme; do
            npm version "$VERSION" --no-git-tag-version --workspace "@openorca-ui/$pkg"
          done
          # Pin the interdependency ranges to this exact release so the published
          # graph is internally consistent (lockstep versioning).
          npm pkg set "dependencies.@openorca-ui/core=$VERSION" --workspace @openorca-ui/react
          npm pkg set "dependencies.@openorca-ui/core=$VERSION" --workspace @openorca-ui/theme
          npm pkg set "dependencies.@openorca-ui/react=$VERSION" --workspace @openorca-ui/theme

      # Auth is via OIDC trusted publishing: configure the trusted publisher for
      # each package on npmjs.com (repo mahimailabs/openorca-ui, workflow
      # publish.yml, environment npm). No NPM_TOKEN is used, and provenance is
      # generated automatically (no --provenance flag needed).
      - name: Publish (idempotent, ordered core -> react -> theme)
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for pkg in core react theme; do
            name="@openorca-ui/$pkg"
            if npm view "$name@$VERSION" version >/dev/null 2>&1; then
              echo "$name@$VERSION already published, skipping"
            else
              npm publish --workspace "$name" --access public
            fi
          done
